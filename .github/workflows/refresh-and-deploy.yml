name: Refresh and deploy SeeArt

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Mondays around 9am New York time during daylight saving time.
    - cron: "0 13 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  refresh-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Seed cache from last deployment
        run: |
          curl --fail --silent --show-error --location \
            "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/exhibitions.json" \
            --output data/exhibitions.json \
            || echo "No previous deployed cache found; using repository cache."

      - name: Refresh exhibition data
        run: python -m seeart.scraper

      - name: Check Python syntax
        run: python -m py_compile app.py seeart/scraper.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build static site
        run: |
          mkdir -p public/data
          cp static/index.html public/index.html
          cp static/app.js public/app.js
          cp static/styles.css public/styles.css
          cp data/exhibitions.json public/data/exhibitions.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: refresh-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
